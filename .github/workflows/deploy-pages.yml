# GitHub Pages デプロイ: main の静的サイト（dist）を Pages に公開する。
# - push to main（実装/データ更新が入った瞬間に反映）＋ 手動起動（workflow_dispatch）
# - データは main にコミット済みの data/*.json を Vite ビルドが dist/ に同梱する
#   （日次の鮮度更新は fetch-daily.yml が state ブランチ経由で別途デプロイする）
# - Pages の source は「GitHub Actions」。最小権限・公式 action は SHA 固定。

name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 最小権限（Pages デプロイに必要な分のみ）
permissions:
  contents: read
  pages: write
  id-token: write

# Pages デプロイは直列化（実行中のデプロイは止めない＝公開物を壊さない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # CI=true により vite.config の base が /nico-danime-viewer/ になる。
      # vite の dataPlugin が data/*.json と data/series/*.json を dist/data へ同梱する。
      - name: Build static site
        run: pnpm build
        env:
          CI: 'true'

      - name: Assert data bundled into dist
        run: |
          test -f dist/data/works.json   || (echo "::error::works.json missing in dist"   && exit 1)
          test -f dist/data/ranking.json || (echo "::error::ranking.json missing in dist" && exit 1)
          test -f dist/data/cours.json   || (echo "::error::cours.json missing in dist"   && exit 1)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
