# F-0046: 日次フルフェッチ＆Pages デプロイ ワークフロー
# 実行タイミング: JST 06:00（UTC 21:00）/ 手動起動
# ※ snapshot 索引は AM5:00 頃に更新されるため、5:00 ジャストより 6:00 の方が鮮度が良い
# 起動条件: M7 完走確認後に有効化
#
# 状態の真実源: state ブランチ（series/*.json / state/*.json を永続化）
# SQLite は廃止（PH-0008 M5）。正本データは純 JSON + メモリ JS ETL。
# 状態書き込みは concurrency group "state-writer" で直列化

name: Daily Full Fetch & Deploy

on:
  schedule:
    # UTC 21:00 = JST 06:00（snapshot 索引更新完了後）。発見系＝日次フル（version ゲート・period 全季・503 バックオフ）。
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Fetch mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
      force_seed:
        description: 'nvapi seed を強制（7日ガード無視・部分DBの各話を全紐付けに戻す・§G）'
        required: false
        default: false
        type: boolean
      force_snapshot:
        description: 'snapshot version gate を無視して強制実行（E2E検証用）'
        required: false
        default: false
        type: boolean

# 最小権限
permissions:
  contents: write # state ブランチへの書き込み
  pages: write # GitHub Pages へのデプロイ
  id-token: write # OIDC トークン（Pages 認証）

# 単一 state-writer: 日次と毎時を含む同一グループで排他制御
concurrency:
  group: state-writer
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    # 暴走・ロック長時間占有を防ぐ上限（フルでも閑散帯1回で収まる想定）
    timeout-minutes: 150

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 状態復元 ────────────────────────────────────────────────
      - name: Checkout state branch (DB / prev / HWM)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: state
          path: state
          fetch-depth: 1
        continue-on-error: true

      - name: Checkout source (main)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: src

      - name: Restore state (DB / prev / HWM)
        run: |
          mkdir -p src/data/state
          if [ -d state ]; then
            cp -r state/. src/data/ 2>/dev/null || true
          fi

      # ── Node / pnpm セットアップ ─────────────────────────────────
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: src/pnpm-lock.yaml

      - name: Install dependencies (frozen lockfile)
        working-directory: src
        run: pnpm install --frozen-lockfile

      # ── version ゲート: snapshot API バージョン確認（参考ログ）──────────────
      # 一時的な HTTP 403/5xx で daily 全体を落とさない（continue-on-error: true）。
      # 実際のスキーマ破壊は後段の snapshot assert が捕捉するため、ここは情報取得に留める。
      - name: Version gate
        working-directory: src
        run: node scripts/fetch.mjs --check-version
        continue-on-error: true
        env:
          NICO_USER_AGENT: 'nico-danime-viewer/1.0 (https://github.com/emanon-i/nico-danime-viewer)'

      # ── Snapshot フル取得（期間分割・逐次・レート遵守・503 バックオフ） ─
      # force_seed=true 時は NICO_FORCE_SEED=1 で nvapi seed を強制し、各話の series 紐付けを
      # 全件やり直す（部分 cache を即フル＝ep>0 6299 に戻す・§G）。
      - name: Full snapshot fetch
        working-directory: src
        run: node scripts/fetch.mjs --mode=full
        env:
          NICO_USER_AGENT: 'nico-danime-viewer/1.0 (https://github.com/emanon-i/nico-danime-viewer)'
          NICO_FORCE_SEED: ${{ inputs.force_seed && '1' || '0' }}
          NICO_FORCE_SNAPSHOT: ${{ inputs.force_snapshot && '1' || '0' }}
          NODE_OPTIONS: '--max-old-space-size=4096'

      # ── ビルド（CSP meta 含む）・data/ を dist/ に配置 ──────────
      - name: Build static site
        working-directory: src
        run: |
          pnpm build
          mkdir -p dist/data
          cp -r data/*.json dist/data/
        env:
          CI: 'true'

      # ── 変更検知アサート: JSON が正常に生成されていることを確認 ──
      - name: Assert data files exist
        working-directory: src
        run: |
          test -f dist/data/works.json   || (echo "::error::works.json not found – aborting deploy"   && exit 1)
          test -f dist/data/ranking.json || (echo "::error::ranking.json not found – aborting deploy" && exit 1)
          test -f dist/data/tags.json    || (echo "::error::tags.json not found – aborting deploy"    && exit 1)
          test -f dist/data/cours.json   || (echo "::error::cours.json not found – aborting deploy"   && exit 1)
          test -f dist/data/kana.json    || (echo "::error::kana.json not found – aborting deploy"    && exit 1)
          test -f dist/data/new.json     || (echo "::error::new.json not found – aborting deploy"     && exit 1)

      # ── Pages デプロイ ─────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: src/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      # ── 状態保存（デプロイ成功後のみ） ───────────────────────────
      # GITHUB_TOKEN で認証。state ブランチを clone（無ければ orphan 初期化）し、
      # data/（build.sqlite は再生成可能なため除外）を反映して push。
      - name: Save state to state branch
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/emanon-i/nico-danime-viewer.git"
          rm -rf state_pub
          if git clone --depth 1 --branch state "$REMOTE" state_pub 2>/dev/null; then
            echo "cloned existing state branch"
          else
            mkdir state_pub && (cd state_pub && git init -b state)
          fi
          rsync -av --delete --exclude='.git' --exclude='build.sqlite' --exclude='*.sqlite' src/data/. state_pub/
          cd state_pub
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --staged --quiet || git commit -m "chore: update state [daily] [skip ci]"
          git push "$REMOTE" HEAD:state
