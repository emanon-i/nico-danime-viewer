# F-0045: 毎時 RSS 取得ワークフロー
# 実行タイミング: 毎時0分 / 手動起動
# 起動条件: ユーザーの GO 後に有効化（このフェーズでは cron を有効にしない）
#
# Action SHA は pnpm/action-setup@v4, actions/setup-node@v4, actions/checkout@v4 の
# 最新安定版を使用。デプロイ前に `gh api /repos/...` で最新 SHA を確認して更新すること。

name: Hourly RSS Fetch

on:
  schedule:
    # 毎時 0 分（UTC）。新着＝チャンネル RSS を毎時取得（条件付き GET・HWM 増分）。
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Fetch mode'
        required: false
        default: 'hourly'
        type: choice
        options:
          - hourly

# 最小権限: state ブランチへの書き込みのみ
permissions:
  contents: write

# 単一 state-writer: 並列実行を防ぎ状態の整合性を保証する
concurrency:
  group: state-writer
  cancel-in-progress: false

jobs:
  fetch-rss:
    runs-on: ubuntu-latest

    steps:
      # ── 状態復元 ────────────────────────────────────────────────
      - name: Checkout state branch (fallback to main)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: state
          path: state
          fetch-depth: 1
        continue-on-error: true

      - name: Checkout main (source)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: src

      - name: Restore state (DB / HWM)
        run: |
          mkdir -p src/data/state
          if [ -d state ]; then
            cp -r state/. src/data/ 2>/dev/null || true
          fi

      # ── Node / pnpm セットアップ ─────────────────────────────────
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: src/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: src
        run: pnpm install --frozen-lockfile

      # ── RSS 取得（条件付き GET・HWM 更新・id 解決） ──────────────
      - name: Fetch RSS (hourly mode)
        working-directory: src
        run: node scripts/fetch.mjs --mode=hourly
        env:
          NICO_USER_AGENT: 'nico-danime-viewer/1.0 (https://github.com/emanon-i/nico-danime-viewer)'

      # ── 状態保存（state ブランチへコミット） ─────────────────────
      # GITHUB_TOKEN で認証。state ブランチを clone（無ければ orphan 初期化）し、
      # data/（build.sqlite 除く）を反映して push。冪等・初回 bootstrap も成功する。
      - name: Save state to state branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/emanon-i/nico-danime-viewer.git"
          rm -rf state_pub
          if git clone --depth 1 --branch state "$REMOTE" state_pub 2>/dev/null; then
            echo "cloned existing state branch"
          else
            mkdir state_pub && (cd state_pub && git init -b state)
          fi
          rsync -av --delete --exclude='.git' --exclude='build.sqlite' --exclude='*.sqlite' src/data/. state_pub/
          cd state_pub
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --staged --quiet || git commit -m "chore: update state [hourly] [skip ci]"
          git push "$REMOTE" HEAD:state
