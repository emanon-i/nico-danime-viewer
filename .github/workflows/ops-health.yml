# 運用ヘルスチェック（PH-0014 / ④-2）。
# scripts/ops-health.mjs を定期実行し、--ci で「データの正しさ」FAIL のときだけジョブを失敗
# させる＝GitHub 標準の workflow 失敗通知メールがリポジトリ owner に飛ぶ。
# 鮮度（cron がやや遅い等）の WARN/FAIL では落とさない（通知過多を避ける）。
#
# 検査対象は Pages 配信物 + state ブランチ（raw）+ GitHub Actions 履歴（gh）。
# GH_TOKEN を渡すと Actions/state 鮮度も見られるが、それらは ci=false で通知対象外。

name: Ops Health Check

on:
  schedule:
    # 6 時間ごと（schedule は間引かれる前提。データ実害の検知用なので高頻度不要）。
    - cron: '0 */6 * * *'
  workflow_dispatch:

# 最小権限（読み取りのみ。state/Pages の取得と gh API 参照に十分）。
permissions:
  contents: read

# 同時実行は最新のみ（古い実行は打ち切ってよい＝公開物に影響しない）。
concurrency:
  group: ops-health
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (main)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # --ci: データ正しさ（構造健全性・U1〜U4）の FAIL のみ exit1 → ジョブ失敗 → 標準通知。
      # 鮮度 WARN/FAIL では落ちない。gh は GH_TOKEN で認証（Actions/state 鮮度の参考表示用）。
      - name: Ops health check (CI mode)
        run: node scripts/ops-health.mjs --ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
